<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formação Vocal — M.M. IBE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══ TOKENS ══ */
:root {
  --green-deep:   #3a4a2e;
  --green-mid:    #4e6040;
  --green-muted:  #8a9872;
  --cream:        #f5f0e8;
  --terracotta:   #b5603a;
  --gold:         #c49a4a;
  --text-dark:    #2a3520;
  --text-mid:     #4e6040;
}

/* ══ DARK ══ */
[data-theme="dark"] {
  --bg-base:      #1e2a14;
  --bg-grad:      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(74,96,46,0.45) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, rgba(181,96,58,0.12) 0%, transparent 55%),
                  #1e2a14;
  --glass:        rgba(255,255,255,0.055);
  --glass-hover:  rgba(255,255,255,0.09);
  --glass-border: rgba(138,152,114,0.22);
  --glass-shine:  rgba(255,255,255,0.06);
  --glass-input:  rgba(0,0,0,0.22);
  --glass-input-border: rgba(138,152,114,0.18);
  --txt:          #e8ddc8;
  --txt-sub:      #9a8e78;
  --txt-label:    #7a8a5a;
  --sep:          rgba(138,152,114,0.12);
  --glow:         0 0 24px rgba(138,152,114,0.12), 0 8px 32px rgba(0,0,0,0.35);
  --glow-sm:      0 2px 16px rgba(0,0,0,0.3);
  --btn-sec-border: rgba(232,221,200,0.15);
  --btn-sec-txt:  #e8ddc8;
  --textarea-txt: #c8b898;
  --badge-kit-bg: rgba(138,152,114,0.15);
  --badge-kit-c:  #8a9872;
  --badge-nokit-bg: rgba(181,96,58,0.12);
  --badge-nokit-c:  #b5603a;
}

/* ══ LIGHT ══ */
[data-theme="light"] {
  --bg-base:      #2a3520;
  --bg-grad:      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(74,96,46,0.5) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, rgba(181,96,58,0.15) 0%, transparent 55%),
                  #2a3520;
  --glass:        rgba(245,240,232,0.14);
  --glass-hover:  rgba(245,240,232,0.2);
  --glass-border: rgba(245,240,232,0.28);
  --glass-shine:  rgba(255,255,255,0.12);
  --glass-input:  rgba(245,240,232,0.12);
  --glass-input-border: rgba(245,240,232,0.25);
  --txt:          #f0ead8;
  --txt-sub:      #b8c0a0;
  --txt-label:    #a0b080;
  --sep:          rgba(245,240,232,0.1);
  --glow:         0 0 24px rgba(58,74,46,0.2), 0 8px 32px rgba(0,0,0,0.4);
  --glow-sm:      0 2px 16px rgba(0,0,0,0.3);
  --btn-sec-border: rgba(245,240,232,0.2);
  --btn-sec-txt:  #f0ead8;
  --textarea-txt: #d8d0b8;
  --badge-kit-bg: rgba(138,152,114,0.2);
  --badge-kit-c:  #a0b080;
  --badge-nokit-bg: rgba(181,96,58,0.15);
  --badge-nokit-c:  #d0784a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-grad);
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0 60px;
}

/* ══ NOISE OVERLAY ══ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ══ THEME TOGGLE ══ */
.theme-toggle {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 200;
  background: var(--glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 15px;
  cursor: pointer;
  box-shadow: var(--glow-sm);
  transition: background 0.2s;
}
.theme-toggle:hover { background: var(--glass-hover); }

/* ══ EDITOR ══ */
.editor {
  width: 100%;
  max-width: 480px;
  padding: 0 16px;
  position: relative;
  z-index: 1;
}

.editor-header {
  text-align: center;
  padding: 40px 0 28px;
}

.editor-logo {
  font-family: 'DM Sans', sans-serif;
  color: var(--txt-label);
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}

.editor-title {
  font-family: 'Playfair Display', serif;
  color: var(--txt);
  font-size: 28px;
  font-weight: 600;
  line-height: 1.15;
  letter-spacing: -0.3px;
}
.editor-title em {
  font-style: italic;
  color: var(--txt-label);
}

/* ══ GLASS CARD ══ */
.card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--glow);
  position: relative;
  overflow: hidden;
}

/* Subtle top shine */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: var(--glass-shine);
  border-radius: 18px 18px 0 0;
}

.card-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--txt-label);
  margin-bottom: 14px;
}

/* ══ INPUTS ══ */
input[type="text"], input[type="date"], select, textarea {
  width: 100%;
  background: var(--glass-input);
  border: 1px solid var(--glass-input-border);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--txt);
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  appearance: none;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
input::placeholder, textarea::placeholder { color: var(--txt-sub); opacity: 0.6; }
input:focus, select:focus, textarea:focus {
  border-color: var(--green-muted);
  background: var(--glass-hover);
}

.input-group { margin-bottom: 10px; }
.input-group label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--txt-label);
  margin-bottom: 5px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Date wrapper */
.date-wrap { position: relative; }
.date-wrap svg {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--txt-label);
}
.date-wrap input[type="date"] { padding-right: 36px; }
input[type="date"]::-webkit-calendar-picker-indicator {
  opacity: 0;
  position: absolute;
  right: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

/* ══ TAGS ══ */
.tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 28px; }
.tag {
  background: rgba(138,152,114,0.15);
  border: 1px solid rgba(138,152,114,0.25);
  color: var(--txt);
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  backdrop-filter: blur(8px);
}
.tag button { background: none; border: none; color: var(--txt-sub); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.tag button:hover { color: var(--txt); }

.add-row { display: flex; gap: 8px; }
.add-row input { flex: 1; margin-bottom: 0; }

/* ══ ADD BTN ══ */
.btn-add {
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--txt);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 0 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}
.btn-add:hover { background: var(--glass-hover); }

/* ══ MÚSICA CARD ══ */
.musica-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--glow-sm);
  transition: opacity 0.2s, box-shadow 0.2s;
  position: relative;
}
.musica-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: var(--glass-shine);
}
.musica-card.dragging { opacity: 0.35; }
.musica-card.drag-over { box-shadow: 0 0 0 2px var(--green-muted), var(--glow-sm); }

.musica-header {
  background: rgba(0,0,0,0.18);
  padding: 11px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: default;
  border-bottom: 1px solid var(--sep);
}

.drag-handle {
  color: var(--txt-sub);
  font-size: 16px;
  flex-shrink: 0;
  cursor: grab;
  user-select: none;
  padding: 2px 3px;
  line-height: 1;
  border-radius: 4px;
  transition: color 0.15s;
}
.drag-handle:hover { color: var(--txt); }
.drag-handle:active { cursor: grabbing; }

.musica-num {
  font-size: 9px;
  font-weight: 700;
  color: var(--txt-sub);
  letter-spacing: 2px;
  flex-shrink: 0;
  opacity: 0.7;
}

.musica-nome-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(138,152,114,0.2);
  border-radius: 0;
  color: var(--txt);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 2px 0;
  flex: 1;
  min-width: 0;
  cursor: text;
  backdrop-filter: none;
}
.musica-nome-input:focus { border-bottom-color: var(--green-muted); outline: none; }
.musica-nome-input::placeholder { color: rgba(255,255,255,0.25); }

.btn-remove-musica {
  background: none;
  border: none;
  color: var(--txt-sub);
  cursor: pointer;
  font-size: 17px;
  flex-shrink: 0;
  line-height: 1;
  opacity: 0.5;
  transition: opacity 0.15s;
}
.btn-remove-musica:hover { opacity: 1; color: var(--terracotta); }

.musica-meta {
  padding: 10px 14px 0;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.badge-kit {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
}
.badge-kit.tem { background: var(--badge-kit-bg); color: var(--badge-kit-c); border: 1px solid rgba(138,152,114,0.2); }
.badge-kit.nao { background: var(--badge-nokit-bg); color: var(--badge-nokit-c); border: 1px solid rgba(181,96,58,0.2); }

/* Fader */
.tom-wrap { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 160px; }
.tom-fader-row { display: flex; align-items: center; gap: 8px; }
.tom-fader {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(to right, rgba(181,96,58,0.5) 0%, rgba(138,152,114,0.15) 50%, rgba(78,96,64,0.5) 100%);
  outline: none;
  cursor: pointer;
}
.tom-fader::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--glass);
  backdrop-filter: blur(8px);
  border: 1.5px solid var(--glass-border);
  box-shadow: 0 1px 6px rgba(0,0,0,0.4);
  cursor: pointer;
}
.tom-fader::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--glass);
  border: 1.5px solid var(--glass-border);
  cursor: pointer;
}
.tom-value {
  font-size: 11px;
  font-weight: 700;
  color: var(--terracotta);
  width: 90px;
  min-width: 90px;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
  flex-shrink: 0;
}
.tom-value.zero { color: var(--txt-sub); font-weight: 400; }
.tom-label { font-size: 8px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--txt-sub); text-align: right; opacity: 0.6; }

.musica-vozes { padding: 10px 14px 12px; display: flex; flex-direction: column; gap: 6px; }
.voz-row { display: grid; grid-template-columns: 96px 1fr; gap: 8px; align-items: center; }
.voz-nome { font-size: 12px; font-weight: 600; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.voz-select { padding: 6px 12px; font-size: 12px; font-weight: 500; }
.voz-obs-input { margin-top: 2px; font-size: 11px !important; padding: 4px 10px !important; color: rgba(181,96,58,0.8) !important; }

/* ══ BOTÕES ══ */
.btn-primary {
  width: 100%;
  background: rgba(58,74,46,0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--cream);
  border: 1px solid rgba(138,152,114,0.3);
  border-radius: 12px;
  padding: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  margin-bottom: 10px;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
}
.btn-primary:hover { background: rgba(78,96,64,0.8); }
.btn-primary:active { transform: scale(0.98); }

.btn-terracotta {
  background: rgba(181,96,58,0.6) !important;
  border-color: rgba(181,96,58,0.4) !important;
}
.btn-terracotta:hover { background: rgba(181,96,58,0.8) !important; }

.btn-secondary {
  width: 100%;
  background: transparent;
  color: var(--btn-sec-txt);
  border: 1px solid var(--btn-sec-border);
  border-radius: 12px;
  padding: 13px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 10px;
}
.btn-secondary:hover { border-color: var(--green-muted); background: var(--glass); }

.actions { padding: 8px 0 0; }

/* ══ SAVE INDICATOR ══ */
.save-indicator {
  text-align: center;
  font-size: 10px;
  color: var(--txt-label);
  opacity: 0;
  transition: opacity 0.4s;
  margin-bottom: 8px;
  height: 14px;
  letter-spacing: 0.5px;
}
.save-indicator.show { opacity: 1; }

.section-sep { border: none; border-top: 1px solid var(--sep); margin: 6px 0 14px; }

/* ══ PREVIEW SECTION ══ */
#preview-section {
  display: none;
  width: 100%;
  max-width: 440px;
  padding: 0 16px;
  margin-top: 8px;
  position: relative;
  z-index: 1;
}

.preview-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--txt-label);
  text-align: center;
  margin-bottom: 16px;
}

/* Área de ações no preview */
.preview-actions {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ══ FORMAÇÃO CARD ══ */
#formacao-card {
  width: 100%;
  background: #2c3820;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
  border: 1px solid rgba(138,152,114,0.15);
}

/* Header do card */
.card-top {
  background: linear-gradient(145deg, #2e3d22 0%, #3a4a2e 40%, #2a3520 100%);
  padding: 26px 22px 20px;
  position: relative;
  overflow: hidden;
}

/* Círculos decorativos */
.card-top::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 200px; height: 200px;
  border-radius: 50%;
  border: 1px solid rgba(138,152,114,0.15);
  pointer-events: none;
}
.card-top::after {
  content: '';
  position: absolute;
  bottom: -30px; left: -20px;
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 1px solid rgba(181,96,58,0.1);
  pointer-events: none;
}

.card-church {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(138,152,114,0.7);
  margin-bottom: 5px;
}

.card-ministry {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: #f0ead8;
  line-height: 1.1;
  margin-bottom: 16px;
}
.card-ministry em {
  font-style: italic;
  color: rgba(138,152,114,0.8);
  font-size: 18px;
}

.card-meta-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.card-meta-item { display: flex; flex-direction: column; gap: 2px; }
.card-meta-label {
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(138,152,114,0.6);
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-meta-label svg { color: rgba(138,152,114,0.8); }
.card-meta-value { font-size: 13px; font-weight: 500; color: #f0ead8; }

/* Linha divisória gradiente */
.card-divider {
  height: 2px;
  background: linear-gradient(90deg, var(--terracotta) 0%, var(--gold) 40%, rgba(138,152,114,0.4) 100%);
}

/* Corpo das músicas */
.card-body { background: transparent; padding: 0; }

.song-block {
  padding: 12px 20px;
  border-bottom: 1px solid rgba(138,152,114,0.1);
  position: relative;
}
.song-block:last-child { border-bottom: none; }

/* Número lateral decorativo */
.song-block-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 7px;
}

.song-index {
  font-size: 8px;
  font-weight: 800;
  color: rgba(138,152,114,0.5);
  letter-spacing: 1px;
  margin-top: 4px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.song-title-wrap { flex: 1; }
.song-title {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 600;
  color: #e8ddc8;
  line-height: 1.3;
}

.song-badges {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.song-badge-nokit {
  font-size: 7px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--terracotta);
  background: rgba(181,96,58,0.1);
  padding: 2px 7px;
  border-radius: 10px;
  border: 1px solid rgba(181,96,58,0.15);
}
.song-badge-tom {
  font-size: 8px;
  font-weight: 700;
  color: #fff;
  background: var(--terracotta);
  padding: 2px 8px;
  border-radius: 10px;
}
.song-badge-original {
  font-size: 8px;
  font-weight: 500;
  color: rgba(138,152,114,0.7);
  background: rgba(138,152,114,0.1);
  padding: 2px 8px;
  border-radius: 10px;
}

.song-voices {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding-left: 22px;
}
.voice-line { display: flex; align-items: baseline; gap: 6px; }
.voice-name {
  font-size: 12px;
  font-weight: 700;
  color: #d8cdb8;
  min-width: 76px;
}
.voice-dash { color: rgba(138,152,114,0.4); font-size: 10px; }
.voice-part { font-size: 12px; color: #9aaa82; font-weight: 400; }
.voice-obs { font-size: 10px; color: rgba(181,96,58,0.8); font-style: italic; }

/* Observação geral */
.card-obs-geral {
  padding: 10px 20px 12px;
  border-top: 1px solid rgba(138,152,114,0.1);
  background: rgba(181,96,58,0.06);
}
.card-obs-label {
  font-size: 7px;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(181,96,58,0.5);
  margin-bottom: 3px;
}
.card-obs-text {
  font-size: 11px;
  color: rgba(232,221,200,0.7);
  font-style: italic;
  line-height: 1.5;
}

/* Footer do card */
.card-footer {
  background: linear-gradient(135deg, #2e3d22 0%, #3a4a2e 100%);
  padding: 11px 20px;
  display: flex;
  justify-content: space-between;

}
.footer-ibe {
  font-family: 'Playfair Display', serif;

}

/* ══ TEXTAREA COPY ══ */
.copy-wrap { margin-top: 12px; }
textarea#texto-copiavel {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: var(--txt);

  resize: none;
  width: 100%;
  min-height: 80px;
  backdrop-filter: blur(12px);

}

/* ══ TOAST ══ */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(58,74,46,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(138,152,114,0.25);
  color: var(--cream);
  padding: 9px 20px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  transition: transform 0.3s ease;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

select option { color: #2a3520; background: #f5f0e8; }
</style>
</head>
<body>

<button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Alternar tema">
  <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:block;">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<!-- ══ EDITOR ══ -->
<div class="editor">
  <div class="editor-header">
    <div class="editor-logo">ibe · ministério de música</div>
    <div class="editor-title">Formação <em>Vocal</em></div>
  </div>

  <div class="card">
    <div class="card-label">Culto</div>
    <div class="input-group">
      <label>Data</label>
      <div class="date-wrap">
        <input type="date" id="data-culto">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
      </div>
    </div>
    <div class="input-group">
      <label>Ministro de Louvor</label>
      <input type="text" id="ministro" placeholder="Nome do ministro">
    </div>
  </div>

  <div class="card">
    <div class="card-label">Vocalistas Escalados</div>
    <div class="tags-wrap" id="tags-vocalistas"></div>
    <div class="add-row">
      <input type="text" id="input-vocalista" placeholder="Nome do vocalista" maxlength="30" list="vocalistas-list">
      <button class="btn-add" onclick="adicionarVocalista()">+ Add</button>
    </div>
  </div>

  <div id="musicas-container"></div>

  <button class="btn-add" style="width:100%;padding:13px;border-radius:12px;font-size:13px;margin-bottom:12px;" onclick="adicionarMusica()">
    + Adicionar Música
  </button>

  <div class="card">
    <div class="card-label">Observação Geral</div>
    <textarea id="obs-geral" rows="3" oninput="salvarDados()" style="resize:none;"></textarea>
  </div>

  <hr class="section-sep">

  <div class="save-indicator" id="save-indicator">✓ Salvo automaticamente</div>

  <div class="actions">
    <button class="btn-primary" onclick="gerarPreview()">Gerar Formação</button>
    <button class="btn-secondary" onclick="limparTudo()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:5px;"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>Recomeçar
    </button>
  </div>
</div>

<!-- ══ PREVIEW ══ -->
<div id="preview-section">
  <div class="preview-label">prévia · formação gerada</div>

  <div id="formacao-card">
    <div class="card-top">
      <div class="card-church">Igreja Batista da Esperança</div>
      <div class="card-ministry">Ministério<br><em>de Música</em></div>
      <div class="card-meta-row">
        <div class="card-meta-item">
          <span class="card-meta-label">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="3" y="4" width="18" height="18" rx="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            Data
          </span>
          <span class="card-meta-value" id="prev-data">—</span>
        </div>
        <div class="card-meta-item">
          <span class="card-meta-label">Ministro</span>
          <span class="card-meta-value" id="prev-ministro">—</span>
        </div>
      </div>
    </div>
    <div class="card-divider"></div>
    <div class="card-body" id="prev-musicas"></div>
    <div class="card-footer">
      <span class="footer-ibe">ibe</span>
      <span class="footer-note">Formação Vocal<br>M.M.</span>
    </div>
  </div>

  <div class="copy-wrap">
    <textarea id="texto-copiavel" readonly></textarea>
  </div>

  <div style="margin-top:10px;">
    <button class="btn-primary" id="btn-salvar" onclick="salvarImagem()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:6px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Copiar Imagem
    </button>
    <button class="btn-primary btn-terracotta" onclick="copiarTexto()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:6px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar Texto
    </button>
    <button class="btn-secondary" onclick="voltarEditor()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:6px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar Formação
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ══════════════════════════════════════════
// REPERTÓRIO COM KIT VOCAL
// Para atualizar: adicione o nome em minúsculas
// ══════════════════════════════════════════
const repertorioComKit = new Set([
  "a ele a glória","agradeço","até outra vez","aclame ao senhor","espírito enche a minha vida",
  "graça","grato sou","gratidão","jesus em tua presença","louvemos ao senhor","muitos virão te louvar",
  "nenhum deus como tu","nunca me deixou","novo dia","poder para salvar","quão formoso és",
  "quebrantado","rei meu","seu sangue","sublime","teu povo","tremenda graça","tu és deus - a ele",
  "tudo é perda","vida aos sepulcros","vou te alegrar","ao único","bondade de deus","descansarei",
  "deus forte","ele é exaltado","emaús","estrela da manha","eu me rendo","eu te bendirei",
  "filho do deus vivo","getsêmani","nada além do sangue","o rei está voltando","poderoso deus",
  "porque ele vive","pra sempre","rei do meu coração","reina em mim","rendido estou",
  "santo pra sempre","teu amor não falha","venha o teu reino","vim para adorar-te","até que ele venha"
]);

const VOZES = ["Lead","Soprano","Contralto","Tenor","Abertura Livre","Base"];
const STORAGE_KEY = 'formacao-vocal-ibe-v2';

let vocalistas = [];
let musicas = [];
let dragSrcId = null;
let saveTimer = null;

// ══ TEMA ══
function setThemeIcon(theme) {
  document.getElementById('icon-sun').style.display = theme === 'dark' ? 'block' : 'none';
  document.getElementById('icon-moon').style.display = theme === 'dark' ? 'none' : 'block';
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  setThemeIcon(next);
  localStorage.setItem('ibe-theme', next);
}

function carregarTema() {
  const saved = localStorage.getItem('ibe-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  setThemeIcon(saved);
}

// ══ LOCALSTORAGE ══
function salvarDados() {
  const payload = {
    data: document.getElementById('data-culto').value,
    ministro: document.getElementById('ministro').value,
    obsGeral: document.getElementById('obs-geral').value,
    vocalistas,
    musicas
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  clearTimeout(saveTimer);
  const ind = document.getElementById('save-indicator');
  ind.classList.add('show');
  saveTimer = setTimeout(() => ind.classList.remove('show'), 1800);
}

function carregarDados() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    document.getElementById('data-culto').value = d.data || '';
    document.getElementById('ministro').value = d.ministro || '';
    document.getElementById('obs-geral').value = d.obsGeral || '';
    vocalistas = d.vocalistas || [];
    musicas = d.musicas || [];
    renderTags();
    renderMusicas();
  } catch(e) { console.error('Erro ao carregar:', e); }
}

// ══ LISTENERS ══
document.getElementById('input-vocalista').addEventListener('keydown', e => { if (e.key === 'Enter') adicionarVocalista(); });
document.getElementById('data-culto').addEventListener('change', salvarDados);
document.getElementById('ministro').addEventListener('input', salvarDados);

// ══ VOCALISTAS ══
function adicionarVocalista() {
  const input = document.getElementById('input-vocalista');
  const nome = input.value.trim();
  if (!nome || vocalistas.includes(nome)) { input.value = ''; return; }
  vocalistas.push(nome);
  input.value = '';
  renderTags();
  atualizarVozesNasMusicas();
  salvarDados();
}

function removerVocalista(nome) {
  vocalistas = vocalistas.filter(v => v !== nome);
  renderTags();
  atualizarVozesNasMusicas();
  salvarDados();
}

function renderTags() {
  document.getElementById('tags-vocalistas').innerHTML = vocalistas.map(v =>
    `<div class="tag">${v}<button onclick="removerVocalista('${v}')">×</button></div>`
  ).join('');
}

// ══ MÚSICAS ══
function adicionarMusica() {
  const id = `m${Date.now()}`;
  musicas.push({ id, nome: '', tom: 0, vozes: {}, vozObs: {} });
  renderMusicas();
  salvarDados();
  setTimeout(() => { const el = document.getElementById(`nome-${id}`); if (el) el.focus(); }, 60);
}

function removerMusica(id) {
  musicas = musicas.filter(m => m.id !== id);
  renderMusicas();
  salvarDados();
}

function renderMusicas() {
  const container = document.getElementById('musicas-container');
  container.innerHTML = '';
  musicas.forEach((m, idx) => {
    const temKit = temKitVocal(m.nome);
    const tomN = Number(m.tom) || 0;
    const tomLabel = tomN === 0 ? 'Tom original' : (tomN > 0 ? `+${tomN}` : `${tomN}`);
    const tomClass = tomN === 0 ? 'zero' : '';

    const vozRows = vocalistas.map(v => {
      const sel = m.vozes?.[v] || '';
      const obs = m.vozObs?.[v] || '';
      const opts = ['', ...VOZES].map(o => `<option value="${o}"${sel===o?' selected':''}>${o}</option>`).join('');
      return `
        <div class="voz-row">
          <div class="voz-nome">${v}</div>
          <select class="voz-select" onchange="setVoz('${m.id}','${v}',this.value)">${opts}</select>
        </div>
        <div style="padding-left:104px;margin-top:-2px;margin-bottom:4px;">
          <input type="text" class="voz-obs-input" style="font-size:11px;padding:4px 10px;" placeholder="obs (ex: Milena)" value="${obs}" oninput="setVozObs('${m.id}','${v}',this.value)">
        </div>`;
    }).join('');

    const div = document.createElement('div');
    div.className = 'musica-card';
    div.id = `card-${m.id}`;
    div.innerHTML = `
      <div class="musica-header">
        <span class="drag-handle" title="Arrastar para reordenar">⠿</span>
        <span class="musica-num">${String(idx+1).padStart(2,'0')}</span>
        <input type="text" class="musica-nome-input" id="nome-${m.id}" placeholder="Nome da música" value="${m.nome}"
          oninput="setNomeMusica('${m.id}',this.value)" list="repertorio-list">
        <button class="btn-remove-musica" onclick="removerMusica('${m.id}')">×</button>
      </div>
      <div class="musica-meta">
        <span class="badge-kit ${temKit?'tem':'nao'}">${temKit?'✓ Kit':'✗ Sem Kit'}</span>
        <div class="tom-wrap">
          <div class="tom-fader-row">
            <input type="range" class="tom-fader" min="-12" max="12" value="${tomN}" oninput="setTomFader('${m.id}',this.value)">
            <span class="tom-value ${tomClass}" id="tom-val-${m.id}">${tomLabel}</span>
          </div>
          <div class="tom-label">Semitons</div>
        </div>
      </div>
      <div class="musica-vozes">${vozRows}</div>`;

    // Drag — só pelo handle
    div.draggable = false;
    const handle = div.querySelector('.drag-handle');
    handle.addEventListener('mousedown', () => { div.draggable = true; });
    document.addEventListener('mouseup', () => { div.draggable = false; });

    div.addEventListener('dragstart', e => {
      if (!div.draggable) { e.preventDefault(); return; }
      dragSrcId = m.id;
      div.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', () => {
      div.draggable = false;
      div.classList.remove('dragging');
      document.querySelectorAll('.musica-card').forEach(c => c.classList.remove('drag-over'));
    });
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.classList.remove('drag-over');
      if (dragSrcId === m.id) return;
      const si = musicas.findIndex(x => x.id === dragSrcId);
      const ti = musicas.findIndex(x => x.id === m.id);
      if (si < 0 || ti < 0) return;
      const [item] = musicas.splice(si, 1);
      musicas.splice(ti, 0, item);
      renderMusicas();
      salvarDados();
    });

    container.appendChild(div);
  });
}

function setNomeMusica(id, val) {
  const m = musicas.find(x => x.id === id);
  if (!m) return;
  m.nome = val;
  const badge = document.querySelector(`#card-${id} .badge-kit`);
  if (badge) {
    const t = temKitVocal(val);
    badge.className = `badge-kit ${t?'tem':'nao'}`;
    badge.textContent = t ? '✓ Kit' : '✗ Sem Kit';
  }
  salvarDados();
}

function setTomFader(id, val) {
  const m = musicas.find(x => x.id === id);
  const n = Number(val);
  if (m) m.tom = n;
  const label = document.getElementById(`tom-val-${id}`);
  if (!label) return;
  const newText = n === 0 ? 'Tom original' : (n > 0 ? `+${n}` : `${n}`);
  const newClass = `tom-value${n === 0 ? ' zero' : ''}`;
  if (label.textContent !== newText) label.textContent = newText;
  if (label.className !== newClass) label.className = newClass;
  salvarDados();
}

function setVoz(id, vocalista, voz) {
  const m = musicas.find(x => x.id === id);
  if (m) { if (!m.vozes) m.vozes = {}; m.vozes[vocalista] = voz; }
  salvarDados();
}

function setVozObs(id, vocalista, obs) {
  const m = musicas.find(x => x.id === id);
  if (m) { if (!m.vozObs) m.vozObs = {}; m.vozObs[vocalista] = obs; }
  salvarDados();
}

function atualizarVozesNasMusicas() {
  musicas.forEach(m => { if (!m.vozes) m.vozes = {}; if (!m.vozObs) m.vozObs = {}; });
  renderMusicas();
}

function temKitVocal(nome) {
  return repertorioComKit.has((nome || '').toLowerCase().trim());
}

// ══ PREVIEW ══
function gerarPreview() {
  musicas.forEach(m => {
    const el = document.getElementById(`nome-${m.id}`);
    if (el) m.nome = el.value;
    const fdr = document.querySelector(`#card-${m.id} .tom-fader`);
    if (fdr) m.tom = Number(fdr.value);
  });

  // Validações
  const musicasSemVoz = musicas.filter(m => m.nome.trim() && vocalistas.every(v => !m.vozes?.[v]));
  const uniqSemVoz = [...new Set(vocalistas.filter(v => musicas.some(m => m.nome.trim() && !m.vozes?.[v])))];
  const avisos = [];
  if (musicasSemVoz.length) avisos.push(`⚠️ ${musicasSemVoz.length} música(s) sem nenhuma voz atribuída.`);
  else if (uniqSemVoz.length) avisos.push(`⚠️ Vocalistas sem voz em alguma música: ${uniqSemVoz.join(', ')}.`);
  if (avisos.length && !confirm(avisos.join('\n') + '\n\nDeseja gerar mesmo assim?')) return;

  const data = document.getElementById('data-culto').value;
  const ministro = document.getElementById('ministro').value;
  const obsGeral = document.getElementById('obs-geral').value.trim();

  let dataFmt = '—';
  if (data) {
    const d = new Date(data + 'T00:00:00');
    dataFmt = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
  }

  document.getElementById('prev-data').textContent = dataFmt;
  document.getElementById('prev-ministro').textContent = ministro || '—';

  const bodyEl = document.getElementById('prev-musicas');
  bodyEl.innerHTML = '';

  musicas.forEach((m, idx) => {
    if (!m.nome.trim()) return;
    const temKit = temKitVocal(m.nome);
    const tomN = Number(m.tom) || 0;

    const badges = [];
    if (!temKit) badges.push(`<span class="song-badge-nokit">sem kit</span>`);
    if (tomN !== 0) badges.push(`<span class="song-badge-tom">${tomN > 0 ? '+' : ''}${tomN} st</span>`);
    else badges.push(`<span class="song-badge-original">Tom original</span>`);

    const vozeLines = vocalistas.map(v => {
      const parte = m.vozes?.[v] || '';
      const obs = m.vozObs?.[v] || '';
      if (!parte) return '';
      return `<div class="voice-line">
        <span class="voice-name">${v}</span>
        <span class="voice-dash">—</span>
        <span class="voice-part">${parte}</span>
        ${obs ? `<span class="voice-obs">(${obs})</span>` : ''}
      </div>`;
    }).filter(Boolean).join('');

    const div = document.createElement('div');
    div.className = 'song-block';
    div.innerHTML = `
      <div class="song-block-header">
        <span class="song-index">${String(idx+1).padStart(2,'0')}</span>
        <div class="song-title-wrap">
          <div class="song-title">${m.nome}</div>
          <div class="song-badges">${badges.join('')}</div>
        </div>
      </div>
      <div class="song-voices">${vozeLines}</div>`;
    bodyEl.appendChild(div);
  });

  if (obsGeral) {
    const obsDiv = document.createElement('div');
    obsDiv.className = 'card-obs-geral';
    obsDiv.innerHTML = `<div class="card-obs-label">Observação</div><div class="card-obs-text">${obsGeral}</div>`;
    bodyEl.appendChild(obsDiv);
  }

  gerarTexto(dataFmt, ministro, obsGeral);
  document.querySelector('.editor').style.display = 'none';
  document.getElementById('preview-section').style.display = 'block';
  window.scrollTo(0, 0);
}

function gerarTexto(data, ministro, obsGeral) {
  let txt = `*FORMAÇÃO VOCAL — M.M. IBE*\n`;
  txt += `${data}  |  ${ministro || '—'}\n`;
  txt += `${'─'.repeat(28)}\n\n`;
  musicas.forEach((m, idx) => {
    if (!m.nome.trim()) return;
    const temKit = temKitVocal(m.nome);
    const tomN = Number(m.tom) || 0;
    txt += `*${String(idx+1).padStart(2,'0')}. ${m.nome}*`;
    if (!temKit) txt += ` _(sem kit)_`;
    if (tomN !== 0) txt += `\n! *${tomN > 0 ? '+' : ''}${tomN} semitons*`;
    txt += '\n';
    vocalistas.forEach(v => {
      const parte = m.vozes?.[v] || '';
      const obs = m.vozObs?.[v] || '';
      if (parte) txt += `  ${v} — ${parte}${obs ? ` (${obs})` : ''}\n`;
    });
    txt += '\n';
  });
  if (obsGeral) txt += `* _${obsGeral}_\n`;
  document.getElementById('texto-copiavel').value = txt.trim();
}

function voltarEditor() {
  document.querySelector('.editor').style.display = 'block';
  document.getElementById('preview-section').style.display = 'none';
}

function copiarTexto() {
  const el = document.getElementById('texto-copiavel');
  el.select(); el.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(el.value).then(() => showToast('Texto copiado!')).catch(() => { document.execCommand('copy'); showToast('Texto copiado!'); });
}

function salvarImagem() {
  const btn = document.getElementById('btn-salvar');
  const originalHTML = btn.innerHTML;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:6px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Gerando...`;
  btn.disabled = true;

  html2canvas(document.getElementById('formacao-card'), {
    scale: 2,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#2c3820',
    logging: false,
    removeContainer: true
  }).then(canvas => {
    // Tenta clipboard primeiro
    if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
      canvas.toBlob(blob => {
        if (!blob) { baixarImagem(canvas); btn.innerHTML = originalHTML; btn.disabled = false; return; }
        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
          .then(() => { showToast('Imagem copiada!'); btn.innerHTML = originalHTML; btn.disabled = false; })
          .catch(() => { baixarImagem(canvas); btn.innerHTML = originalHTML; btn.disabled = false; });
      }, 'image/png');
    } else {
      // Fallback direto: download
      baixarImagem(canvas);
      btn.innerHTML = originalHTML;
      btn.disabled = false;
    }
  }).catch(err => {
    console.error('html2canvas error:', err);
    showToast('Erro — tente pelo GitHub Pages');
    btn.innerHTML = originalHTML;
    btn.disabled = false;
  });
}

function baixarImagem(canvas) {
  const link = document.createElement('a');
  const data = document.getElementById('prev-data').textContent.replace(/\//g, '-');
  link.download = `formacao-vocal-${data}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('Imagem baixada!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function limparTudo() {
  if (!confirm('Limpar toda a formação atual?')) return;
  vocalistas = []; musicas = [];
  document.getElementById('data-culto').value = '';
  document.getElementById('ministro').value = '';
  document.getElementById('obs-geral').value = '';
  renderTags(); renderMusicas();
  localStorage.removeItem(STORAGE_KEY);
}
